<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StratFoundry — Make Strategy Operational</title>
  <meta name="description" content="Enterprise planning software that transforms Annual Operating Plans into measurable results. Launching 2026." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream: #F5F0E8;
      --orange: #C8622A;
      --orange-light: #E07A45;
      --navy: #1C2B3A;
      --text: #3A3530;
      --text-muted: #7A7168;
      --tan: #B8895A;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--cream);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Subtle texture overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.4;
    }

    /* Nav */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      padding: 28px 48px;
      display: flex;
      align-items: center;
      z-index: 100;
      mix-blend-mode: multiply;
    }

    .logo {
      font-family: 'DM Sans', sans-serif;
      font-weight: 500;
      font-size: 1rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--orange);
      text-decoration: none;
    }

    /* Hero */
    .hero {
      position: relative;
      min-height: 100vh;
      display: grid;
      grid-template-columns: 1fr 1fr;
      align-items: center;
      padding: 0 48px;
      z-index: 1;
    }

    .hero-content {
      padding-top: 80px;
      animation: fadeUp 1s ease both;
    }

    .hero-label {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--orange);
      margin-bottom: 32px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .hero-label::before {
      content: '';
      display: block;
      width: 32px;
      height: 1px;
      background: var(--orange);
    }

    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(3.5rem, 6vw, 5.5rem);
      font-weight: 300;
      line-height: 1.05;
      color: var(--navy);
      margin-bottom: 32px;
      letter-spacing: -0.01em;
    }

    h1 em {
      font-style: italic;
      color: var(--orange);
      font-weight: 300;
    }

    .hero-sub {
      font-size: 1rem;
      font-weight: 300;
      color: var(--text-muted);
      line-height: 1.7;
      max-width: 420px;
      margin-bottom: 48px;
    }

    .launch-badge {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      border: 1px solid rgba(200, 98, 42, 0.3);
      border-radius: 2px;
      padding: 12px 20px;
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--orange);
    }

    .launch-badge .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--orange);
      animation: pulse 2s ease-in-out infinite;
    }

    /* Decorative right side */
    .hero-visual {
      position: relative;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: fadeIn 1.4s ease both;
    }

    .crucible-wrap {
      position: relative;
      width: 280px;
      height: 280px;
    }

    .ring {
      position: absolute;
      border-radius: 50%;
      border: 1px solid rgba(200, 98, 42, 0.12);
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      animation: rotate 20s linear infinite;
    }
    .ring:nth-child(1) { width: 280px; height: 280px; animation-duration: 25s; }
    .ring:nth-child(2) { width: 200px; height: 200px; animation-duration: 18s; animation-direction: reverse; border-color: rgba(200, 98, 42, 0.2); }
    .ring:nth-child(3) { width: 120px; height: 120px; animation-duration: 12s; border-color: rgba(200, 98, 42, 0.3); }

    .crucible-icon {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
    }

    /* SVG crucible */
    .crucible-svg {
      width: 72px;
      height: 72px;
      filter: drop-shadow(0 8px 24px rgba(200, 98, 42, 0.3));
    }

    /* Bottom strip */
    .bottom-strip {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      padding: 20px 48px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      z-index: 100;
      animation: fadeIn 1.8s ease both;
    }

    .strip-text {
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .strip-line {
      flex: 1;
      height: 1px;
      background: linear-gradient(to right, transparent, rgba(200, 98, 42, 0.2), transparent);
      margin: 0 32px;
    }

    /* Animations */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.8); }
    }

    @keyframes rotate {
      from { transform: translate(-50%, -50%) rotate(0deg); }
      to { transform: translate(-50%, -50%) rotate(360deg); }
    }

    /* Mobile */
    @media (max-width: 768px) {
      nav { padding: 24px; }

      .hero {
        grid-template-columns: 1fr;
        padding: 0 24px;
        min-height: auto;
        padding-top: 120px;
        padding-bottom: 80px;
      }

      .hero-visual { display: none; }

      h1 { font-size: 3rem; }

      .bottom-strip { padding: 20px 24px; }
    }
  </style>
</head>
<body>

  <nav>
    <a class="logo" href="#">StratFoundry</a>
  </nav>

  <section class="hero">
    <div class="hero-content">
      <p class="hero-label">Enterprise Planning Software</p>
      <h1>Make Strategy<br><em>Operational</em></h1>
      <p class="hero-sub">Need a more robust way to transform Annual Operating Plans to results?</p>
      <div class="launch-badge">
        <span class="dot"></span>
        Launching in 2026
      </div>
    </div>

    <div class="hero-visual">
      <div class="crucible-wrap">
        <div class="ring"></div>
        <div class="ring"></div>
        <div class="ring"></div>
        <div class="crucible-icon">
          <svg class="crucible-svg" viewBox="0 0 72 72" fill="none" xmlns="http://www.w3.org/2000/svg">
            <!-- Crucible vessel -->
            <path d="M18 24 Q18 52 36 56 Q54 52 54 24 Z" fill="url(#molten)" opacity="0.9"/>
            <!-- Rim -->
            <rect x="14" y="20" width="44" height="6" rx="3" fill="#C8622A"/>
            <!-- Glow particles -->
            <circle cx="36" cy="14" r="2.5" fill="#E07A45" opacity="0.8"/>
            <circle cx="42" cy="10" r="1.5" fill="#E07A45" opacity="0.5"/>
            <circle cx="30" cy="11" r="1.8" fill="#E07A45" opacity="0.6"/>
            <circle cx="46" cy="15" r="1" fill="#E07A45" opacity="0.4"/>
            <defs>
              <linearGradient id="molten" x1="36" y1="24" x2="36" y2="56" gradientUnits="userSpaceOnUse">
                <stop offset="0%" stop-color="#E07A45"/>
                <stop offset="100%" stop-color="#8B3A1A"/>
              </linearGradient>
            </defs>
          </svg>
        </div>
      </div>
    </div>
  </section>

  <div class="bottom-strip">
    <span class="strip-text">stratfoundry.in</span>
    <div class="strip-line"></div>
    <span class="strip-text">© 2026</span>
  </div>

</body>
</html>
